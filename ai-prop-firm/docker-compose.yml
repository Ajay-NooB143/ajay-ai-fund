version: "3.8"

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - API_SECRET=${API_SECRET:-change-me-in-production}
      - DRY_RUN=true
    depends_on:
      - redis

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: ["python", "worker.py"]
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DRY_RUN=true
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
