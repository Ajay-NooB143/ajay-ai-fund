name: Trading Bot

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run-trading:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: trading
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      BINANCE_API_KEY: ${{ secrets.BINANCE_API_KEY }}
      BINANCE_SECRET: ${{ secrets.BINANCE_API_SECRET }}
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/trading

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install build tools
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q libpq-dev

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Initialize database
        run: psql -h localhost -U postgres -d trading -f db/schema.sql
        env:
          PGPASSWORD: postgres

      - name: Run trading bot
        run: |
          timeout 60 python main.py; rc=$?
          if [ "$rc" -eq 124 ]; then
            echo "✅ Bot ran successfully for 60s (timeout reached)"
            exit 0
          fi
          exit $rc

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: bot-logs
          path: |
            *.log
            data/
